services:
  - type: web
    name: smart-chicken-farm-api
    runtime: python
    region: ohio
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: smart-chicken-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: smart-chicken-db
    region: ohio
    plan: free
